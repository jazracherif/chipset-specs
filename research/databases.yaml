- name: Crystal
  institution: MIT
  year: 2020
  type: academic
  architecture: column-store
  gpu_target: "NVIDIA (CUDA)"
  language: C++/CUDA
  status: active
  query_language: Custom DSL
  description: >
    Library of parallel GPU routines for running full SQL queries with minimal materialization
    overhead. Uses a model-based approach to analyze when and why GPU vs CPU speedups deviate
    from the memory bandwidth ratio (~16× on modern hardware).
  github_url: https://github.com/anilshanbhag/crystal
  key_features:
    - Full SQL on GPU with minimal materialization
    - Selection and projection near bandwidth-ratio speedup
    - Joins achieve less speedup due to hardware capability differences
    - Full query speedup exceeds bandwidth ratio (25× over CPU on SSB benchmark)
    - CPU vectorization limitations amplify GPU gains on chained operators
    - Model-based performance analysis vs memory bandwidth ratio
  paper_links:
    - title: "A Study of the Fundamental Performance Characteristics of GPUs and CPUs for Database Analytics"
      venue: ACM
      year: 2020
      url: https://dl.acm.org/doi/epdf/10.1145/3318464.3380595

