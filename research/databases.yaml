- name: "Theseus (Voltron Data)"
  company: Voltron Data
  founded_year: 2021
  type: industry
  licensing: commercial
  gpu_support: "NVIDIA (CUDA), Arrow-native"
  status: deprecated
  query_language: "SQL (ANSI) + Python"
  website: https://voltrondata.com
  github_url: null
  description: >
    GPU-native federated query engine built by the creators of Apache Arrow. Theseus
    addresses sequential data movement costs from file I/O, spilling, and network shuffles
    that block GPU compute. Uses proactive byte movement with asynchronous executors to move
    data between GPU, host memory, and storage tiers before the compute phase begins.
    Leverages the Arrow columnar format throughout for zero-copy data sharing.
  use_case_focus:
    - Proactive asynchronous data movement
    - GPU/Host/Storage tiering
    - Federated analytics
    - Arrow-native columnar execution
  notable_customers:
    - Enterprise data teams
  cloud_platforms:
    - Multi-cloud
  paper_links:
    - title: "Theseus: Proactive Data Movement for GPU-Native Query Processing"
      venue: arXiv
      year: 2025
      url: https://arxiv.org/abs/2508.05029

- name: Themis
  institution: Research
  year: 2024
  type: academic
  architecture: column-store
  gpu_target: "NVIDIA (CUDA)"
  language: C++/CUDA
  status: active
  query_language: SQL
  description: >
    Addresses intra-warp and inter-warp thread divergence that idles GPU cores during
    query processing. Introduces warp-level redistribution using fine-grained work-stealing
    and tuple redistribution to ensure SIMT efficiency across all active warps.
  key_features:
    - Warp-level work-stealing
    - Fine-grained tuple redistribution
    - SIMT efficiency through dynamic load balancing
    - Eliminates inter-warp and intra-warp idle cores
  paper_links:
    - title: "Themis: GPU-Efficient Load-Balanced Query Processing"
      venue: PVLDB
      year: 2024
      url: https://dl.acm.org/doi/10.14778/3705829.3705856

