- name: Harmonia
  institution: Peking University
  year: 2020
  type: academic
  architecture: hybrid
  gpu_target: "NVIDIA (CUDA)"
  language: C++/CUDA
  status: active
  query_language: SQL
  description: >
    Novel GPU-optimized B+tree structure that bridges the gap between B+tree access patterns
    and GPU hardware. Divides the tree into a key region (breadth-first node layout) and a
    prefix-sum child region that fits in on-chip caches for high locality. Achieves up to
    3.6 billion queries/second on a TITAN V GPU — 3.4× faster than prior state-of-the-art.
  key_features:
    - B+tree split into key region (BFS layout) and prefix-sum child region
    - Child region fits in on-chip cache for high locality
    - Partially-sorted aggregation to reduce memory divergence
    - Narrowed thread-group traversal to improve warp utilization
    - 3.6 billion queries/sec on TITAN V (3.4× over HB+Tree)
    - Addresses global memory access patterns and warp divergence on GPUs
  paper_links:
    - title: "Harmonia: A High Throughput B+tree for Main Memory Database"
      venue: PPoPP
      year: 2020
      url: https://dl.acm.org/doi/epdf/10.1145/3293883.3295704

- name: Wukong+G
  institution: Shanghai Jiao Tong University
  year: 2021
  type: academic
  architecture: graph
  gpu_target: "NVIDIA (CUDA)"
  language: C++/CUDA
  status: active
  query_language: SPARQL
  description: >
    First graph-based distributed RDF query processing system exploiting hybrid CPU/GPU
    parallelism for SPARQL queries at scale. Addresses throughput collapse under heavy
    data-intensive queries via query-aware prefetching, GPU-friendly RDF store, GPUDirect
    RDMA communication, and adaptive CPU/GPU query scheduling. Outperforms Wukong by up to
    9× and improves latency and throughput by over an order of magnitude on hybrid workloads.
  github_url: https://github.com/SJTU-IPADS/wukong-g
  key_features:
    - Hybrid CPU+GPU parallelism for distributed SPARQL
    - Query-aware prefetching and pattern-aware pipelining for latency hiding
    - GPU-friendly RDF store supporting graphs exceeding GPU memory (predicate-based grouping)
    - GPUDirect RDMA for efficient cluster communication
    - Multi-query concurrency on a single GPU
    - Adaptive single-query scheduling across CPU and GPU
    - Scales to 10 GPU cards; 9× speedup over CPU-only Wukong on heavy queries
  paper_links:
    - title: "Wukong+G: Fast and Concurrent RDF Query Processing using RDMA and GPU"
      venue: IEEE TPDS
      year: 2021
      url: https://ieeexplore.ieee.org/document/9582823

