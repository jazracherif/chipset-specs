# Intel Xeon Server CPU Specifications
# Each entry covers one CPU SKU (single-socket figures unless noted).

cpus:

  - name: Xeon 8380
    full_name: Intel Xeon Platinum 8380
    brand: Intel
    # Default source: [1] Intel ARK — Xeon Platinum 8380 Specifications
    # Fields from other sources are annotated with [n]
    references:
      - name: Intel ARK — Xeon Platinum 8380 Specifications     # [1] default
        url: https://www.intel.com/content/www/us/en/products/sku/212287/intel-xeon-platinum-8380-processor-60m-cache-2-30-ghz/specifications.html
    family: Xeon Scalable
    generation: Ice Lake
    gen_number: 3
    year: 2021
    max_cores: 40
    memory_channels: 8
    memory_type: DDR4-3200
    memory_bandwidth_gbs: 205           # derived: 8 channels × 25.6 GB/s (DDR4-3200 per channel)
    best_simd: AVX-512
    simd_width_bits: 512
    avx_fp_units: 80                    # derived: 40 cores × 2 AVX-512 FMA units per core
    peak_fp32_tflops: 2.9               # derived: 80 FMA units × 16 FP32/unit × 2.3 GHz / 1000
    peak_fp32_clock_ghz: 2.3

  - name: Xeon 8490H
    full_name: Intel Xeon Platinum 8490H
    brand: Intel
    # Default source: [1] Intel ARK — Xeon Platinum 8490H Specifications
