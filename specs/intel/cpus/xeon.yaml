# Intel Xeon Server CPU Specifications
# Each entry covers one CPU SKU (single-socket figures unless noted).
# Groups mirror Intel ARK sections: Essentials / CPU Specifications / Memory Specifications /
# Expansion Options / Package Specifications / Advanced Technologies / Security & Reliability.

cpus:

  - name: Xeon 8380
    full_name: Intel Xeon Platinum 8380
    brand: Intel
    # Default source: [1] Intel ARK CSV export — Xeon Platinum 8380 (downloaded 2026-04-01)
    # Fields from other sources are annotated with [n]
    references:
      - name: Intel ARK — Xeon Platinum 8380 Specifications     # [1] default
        url: https://www.intel.com/content/www/us/en/products/sku/212287/intel-xeon-platinum-8380-processor-60m-cache-2-30-ghz/specifications.html

    essentials:
      product_collection: 3rd Gen Intel® Xeon® Scalable Processors
      code_name: Ice Lake
      lithography: 10 nm
      launch_date: Q2'21
      recommended_customer_price_usd: 9359.00

    cpu_specifications:
      total_cores: 40
      total_threads: 80
      base_frequency_ghz: 2.30
      max_turbo_frequency_ghz: 3.40
      cache_mb: 60
      upi_speed_gts: 11.2
      max_upi_links: 3
      tdp_w: 270

    memory_specifications:
      max_memory_size_tb: 6
      memory_types: DDR4-3200
      max_memory_speed_mhz: 3200
      memory_channels: 8
      memory_bandwidth_gbs: 205         # derived: 8 channels × 25.6 GB/s (DDR4-3200 per channel)
      optane_pmem_supported: true
      ecc_supported: true

    expansion_options:
      scalability: 2S
      pcie_revision: "4.0"
      max_pcie_lanes: 64

    package_specifications:
      socket: FCLGA4189
      tcase_c: 83
      package_size_mm: 77.5 x 56.5

    advanced_technologies:
      instruction_set_extensions: "SSE4.2, AVX, AVX2, AVX-512"
      avx512_fma_units: 2
      best_simd: AVX-512
      simd_width_bits: 512
      avx_fp_units: 80                  # derived: 40 cores × 2 AVX-512 FMA units per core
      peak_fp32_tflops: 2.9             # derived: 80 FMA units × 16 FP32/unit × 2.3 GHz / 1000
      peak_fp32_clock_ghz: 2.3
      hyper_threading: true
      turbo_boost_version: "2.0"
      amx: false
      dl_boost: true
      speed_select_core_power: true
      speed_select_turbo_freq: true
      speed_select_base_freq: true
      high_priority_cores: 16
      high_priority_core_freq_ghz: 2.40
      low_priority_cores: 24
      low_priority_core_freq_ghz: 2.20
      resource_director_rdt: true
      speed_shift: true
      transactional_sync_extensions: true
      volume_management_device_vmd: true

    security_and_reliability:
      aes_ni: true
      sgx: "Yes with Intel® SPS"
      sgx_epc_max_gb: 512
      trusted_execution_technology: true
      execute_disable_bit: true
      vt_x: true
      vt_d: true
      ept: true
      total_memory_encryption: true
      crypto_acceleration: true
      platform_firmware_resilience: true
      run_sure: true
      mbec: true


