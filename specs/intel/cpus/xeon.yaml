      - name: Intel ARK — Xeon Platinum 8490H Specifications    # [1] default
        url: https://www.intel.com/content/www/us/en/products/sku/231747/intel-xeon-platinum-8490h-processor-112-5m-cache-1-90-ghz/specifications.html
    family: Xeon Scalable
    generation: Sapphire Rapids
    gen_number: 4
    year: 2023
    max_cores: 60
    memory_channels: 8
    memory_type: DDR5-4800
    memory_bandwidth_gbs: 307           # derived: 8 channels × 38.4 GB/s (DDR5-4800 per channel)
    best_simd: AVX-512
    simd_width_bits: 512
    avx_fp_units: 120                   # derived: 60 cores × 2 AVX-512 FMA units per core
    peak_fp32_tflops: 4.8               # derived: 120 FMA units × 16 FP32/unit × 2.5 GHz / 1000
    peak_fp32_clock_ghz: 2.5

  - name: Xeon 8592+
