# AMD EPYC Server CPU Specifications
# Terminology: native AMD/x86 throughout.
# Each entry covers one CPU SKU (single-socket figures unless noted).

cpus:

  - name: EPYC 7763
    full_name: AMD EPYC 7763
    brand: AMD
    # Default source: [1] AMD EPYC 7763 Product Page
    # Fields from other sources are annotated with [n]
    references:
      - name: AMD EPYC 7763 Product Page                        # [1] default
        url: https://www.amd.com/en/products/processors/server/epyc/7003-series/amd-epyc-7763.html
    family: EPYC
    generation: Milan
    microarch: Zen 3
    gen_number: 3
    year: 2021
    max_cores: 64
    memory_channels: 8
    memory_type: DDR4-3200
    memory_bandwidth_gbs: 205           # derived: 8 channels × 25.6 GB/s (DDR4-3200 per channel)
    best_simd: AVX2
    simd_width_bits: 256
    avx_fp_units: 128                   # derived: 64 cores × 2 AVX2 FMA units per core
    peak_fp32_tflops: 2.5               # derived: 128 FMA units × 8 FP32/unit × 2.4 GHz / 1000
    peak_fp32_clock_ghz: 2.4

  - name: EPYC 9654
    full_name: AMD EPYC 9654
    brand: AMD
    # Default source: [1] AMD EPYC 9654 Product Page
    # Fields from other sources are annotated with [n]
    references:
      - name: AMD EPYC 9654 Product Page                        # [1] default
        url: https://www.amd.com/en/products/processors/server/epyc/4th-generation-9004-and-8004-series/amd-epyc-9654.html
    family: EPYC
    generation: Genoa
    microarch: Zen 4
    gen_number: 4
    year: 2022
    max_cores: 96
    memory_channels: 12
    memory_type: DDR5-4800
    memory_bandwidth_gbs: 461           # derived: 12 channels × 38.4 GB/s (DDR5-4800 per channel)
    best_simd: AVX-512
    simd_width_bits: 512
    avx_fp_units: 192                   # derived: 96 cores × 2 AVX-512 FMA units per core
    peak_fp32_tflops: 3.7               # derived: 192 FMA units × 16 FP32/unit × 2.4 GHz / 1000 (approx; Zen 4 AVX-512 width)
    peak_fp32_clock_ghz: 2.4

  - name: EPYC 9965
    full_name: AMD EPYC 9965X
    brand: AMD
    # Default source: [1] AMD EPYC 9965 Product Page
    # Fields from other sources are annotated with [n]
    references:
      - name: AMD EPYC 9965 Product Page                        # [1] default
        url: https://www.amd.com/en/products/processors/server/epyc/9005-series/amd-epyc-9965.html
    family: EPYC
    generation: Turin
    microarch: Zen 5
    gen_number: 5
    year: 2024
    max_cores: 192
    memory_channels: 12
    memory_type: DDR5-6000
    memory_bandwidth_gbs: 576           # derived: 12 channels × 48.0 GB/s (DDR5-6000 per channel)
    best_simd: AVX-512
    simd_width_bits: 512
    avx_fp_units: 384                   # derived: 192 cores × 2 AVX-512 FMA units per core
    peak_fp32_tflops: 7.4               # derived: 384 FMA units × 16 FP32/unit × 2.4 GHz / 1000 (approx; Zen 5 512-bit AVX)
    peak_fp32_clock_ghz: 2.4

