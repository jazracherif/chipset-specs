common_references:
  - name: CUDA C++ Programming Guide - Memory Hierarchy
    url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#memory-hierarchy
  - name: CUDA C++ Programming Guide - Thread Block Clusters (Distributed Shared Memory)
    url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#thread-block-cluster

gpus:
  GB10:
    name: NVIDIA GB10 (DGX Spark)
    references:
      - name: NVIDIA DGX Spark GB10
        url: https://www.nvidia.com/en-us/products/workstations/dgx-spark/
      - name: DGX Spark GB10 Datasheet
        url: https://nvdam.widen.net/s/tlzm8smqjx/workstation-datasheet-dgx-spark-gtc25-spring-nvidia-us-3716899-web/
      - name: Blackwell Architecture Technical Brief
        url: https://resources.nvidia.com/en-us-blackwell-architecture/blackwell-architecture-technical-brief

    core_specifications:
      release_date: Q4 2025
      architecture: Blackwell
      compute_capability: 12.1
      gpu_count: 1
      cpu: "1x Grace CPU (20-core Arm Neoverse V2)"
      streaming_multiprocessors: 48
      cuda_cores_fp32_per_sm: 128
      cuda_cores_fp32_per_gpu: 6144  # 128 × 48 SMs
      max_clock_speed: 3003 MHz
      form_factor: Desktop / workstation APU

    sm_execution_model:
      shared_memory_per_sm: 100 KB
      shared_memory_per_block: 99 KB
      max_resident_threads_per_sm: 1536
      max_resident_blocks_per_sm: 24

    memory_specifications:
      # GB10 uses a single unified LPDDR5x pool shared between CPU and GPU — bandwidth is not additive
      architecture: Unified (Grace CPU + Blackwell GPU share same LPDDR5x pool)
      total_capacity: 128 GB LPDDR5x
      memory_type: LPDDR5x
      ecc_support: true
      addressing_mode: ATS (Address Translation Services)
      pageable_memory_access_via_host_page_tables: true
      concurrent_managed_access: true
      cpu_gpu_transfer: Zero-copy (unified memory via ATS)
      pcie_generation: Gen 5 (64 GB/s per direction)

      gpu_memory:
        capacity: 128 GB (shared pool)
        memory_type: LPDDR5x
        l2_cache: 24 MB
        l2_cache_max: 128 MB
        # ~301 GB/s cited in GB200 comparison; ~273 GB/s cited in T4 comparison (different measurement contexts)
        bandwidth: ~273–301 GB/s
        bus_width: "256-bit (unified with Grace CPU)"

      cpu_memory:
        capacity: 128 GB (shared pool)
        bandwidth: "Shared with GPU (same LPDDR5x pool — not additive)"

      memory_hierarchy:
        # Hierarchy from fastest/smallest to slowest/largest (per GPU, 48 SMs)
        registers:
          capacity_per_sm: "256 KB (64K × 32-bit registers)"
          total_per_gpu: "~12 MB (256 KB × 48 SMs)"
          throughput: "On-chip, not bandwidth-bound; effectively hundreds of TB/s aggregate"
          latency: "~1 cycle (zero-overhead within a warp when no RAW hazards)"

        l1_cache_shared_memory:
          # Unified SRAM pool; configurable split between L1 data cache and shared memory
          capacity_per_sm: "~128 KB unified (max 100 KB addressable as shared memory)"
          total_per_gpu: "~6 MB (128 KB × 48 SMs)"
          throughput: "~18 TB/s aggregate (48 SMs × 128 B/cycle × 3003 MHz)"
          latency: "~28–32 cycles (shared memory, bank-conflict-free)"
          notes: "L1 cache uses remaining SRAM not allocated to shared memory"

        distributed_shared_memory:
          # Thread block clusters allow SMs to directly read/write peer-SM shared memory
          available: true
          capacity_per_cluster: "up to ~800 KB (up to 8 SMs × 100 KB per SM)"
          throughput: "Lower than local shared memory; constrained by inter-SM L2 crossbar"
          latency: "~50–100 cycles (peer-SM access within a thread block cluster)"
          notes: "Available on SM 12.1 (Blackwell); enabled via cooperative distributed SMEM API"

        l2_cache:
          capacity: "24 MB (max 128 MB configurable)"
          throughput: "~1.5–2 TB/s (estimated; shared between CPU and GPU on unified LPDDR5x path)"
          latency: "~150–200 cycles"
          notes: "L2 is shared between CPU and GPU in the Grace unified memory pool"

        global_dram:
          capacity: "128 GB LPDDR5x (shared CPU+GPU pool)"
          memory_type: LPDDR5x
          throughput: "~273–301 GB/s (peak; shared CPU+GPU — not additive)"
          latency: "~200–400 cycles (LPDDR5x; higher than HBM due to off-chip bus protocol)"
          notes: "Unified memory: zero-copy CPU↔GPU via ATS; no separate device memory"

    compute_performance:
      fp4: ~1.28 PFLOPS
      fp8_fp6: ~640 TFLOPS
      fp16_bf16: ~320 TFLOPS (Tensor Cores)
      tf32: ~160 TFLOPS
      fp32: ~40 TFLOPS
      fp64: ~20 TFLOPS
      int8: ~640 TOPS
      tensor_core_generation: "5th Gen (Blackwell)"
      fp4_fp6_tensor_core_support: true
      rt_cores: "3rd Gen (48 cores)"

    power_and_thermal:
      total_system_tdp: 140 W
      gpu_tdp: ~100 W (estimated)
      idle_power: ~4.6 W
      form_factor: Compact APU (Desktop)
      cooling: Active air cooling
      power_efficiency_fp16: ~229 GFLOPS/W
      power_connector: System power

    advanced_features:
      mig: "Yes (up to 7 instances)"
      nvlink: NVLink 5.0 (optional)
      dynamic_programming: Full support
      thread_block_clusters: true
      tensor_memory_accelerator: true
      hardware_coherency: "Yes (ATS/PASID support)"
      transformer_engine: "Yes (FP8 optimized)"
      distributed_shared_memory: true
      ray_tracing: "3rd Gen RT Cores"
      dlss: "4.0"
      unified_memory: Hardware-coherent (ATS)
      confidential_computing: Limited
      atomic_caps_outbound: [FETCHADD_64, CAS_64]

    networking_and_connectivity:
      pcie_interface: PCIe 5.0 x16
      high_speed_interconnect: "ConnectX-7 (200 Gb/s InfiniBand / Ethernet)"
      multi_node_clustering: "Native support via ConnectX-7"
      nvlink_fabric: Optional
      nvswitch: Not included
      rdma: "Integrated with ConnectX-7"
      gpu_to_gpu_direct: "Yes (GPUDirect RDMA)"
      sharp: true

    software_and_ecosystem:
      cuda_toolkit: "13.0+"
      minimum_driver: "570.00+"
      cublas: cuBLAS 13.x with FP8
      cudnn: "9.x"
      tensorrt: "11.x+ (FP8 support)"
      nccl: "2.28+"
      pytorch: "2.x+ (Arm + CUDA)"
      tensorflow: "2.x+"


